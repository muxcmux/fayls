name: Push container to GHCR
on:
  workflow_dispatch
jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build and push the image
        run : |
          docker login --username muxcmux --password ${{ secrets.GH_PAT }} ghcr.io
          docker build . -t ghcr.io/muxcmux/fayls:latest
          docker push ghcr.io/muxcmux/fayls:latest
