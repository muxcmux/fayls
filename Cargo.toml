[package]
name = "fayls"
version = "0.1.0"
authors = ["muxcmux <storm.bg@gmail.com>"]
edition = "2024"

[dependencies]
tokio = { version = "1", features = ["macros", "signal"] }

rusqlite = { version = "0.38", features = ["fallible_uint"] }
refinery = { version = "0.9", features = ["rusqlite"] }

anyhow = "1"

salvo ={ version = "0.92", features = ["affix-state"] }

tracing = "0.1"
tracing-subscriber = "0.3"

walkdir = "2"

serde = { version = "1", features = ["derive"] }

config = "0.15"
